<script>
  const state = {
    cases: [],
    registrations: [],
    lineUserId: '',
    liffProfileName: '',
    currentView: 'registration',
    adminCaseId: '',
    adminFilter: 'needsAction',
    adminSearch: '',
    adminSelectedRecords: new Set()
  };

  const ADMIN_PASSWORD = '543';
  const ADMIN_SESSION_KEY = 'donationAdminAuthed';
  const LAST_FORM_KEY = 'donationLastRegistrationForm';

  const els = {};

  document.addEventListener('DOMContentLoaded', () => {
    setupRegistrationUiDraft();
    cacheElements();
    bindEvents();
    updateReceiptModeVisibility();
    refreshLastFormButton();
    hydrateInitialLineProfile();
    renderLoadingCases();
    loadData();
    initLiff();

    if (document.body.dataset.mode === 'admin') {
      openAdminWithPassword();
    } else {
      switchView('registration');
    }
  });

  function setupRegistrationUiDraft() {
    const intro = document.querySelector('#registrationView .screenIntro');
    if (intro) {
      const heading = intro.querySelector('h1');
      const note = intro.querySelector('p');
      if (heading) heading.textContent = '捐款登記';
      if (note) note.textContent = '選擇開放個案，填寫代表人與芳名資料。';
    }

    const projectTitle = document.querySelector('.projectPanel .sectionTitle');
    if (projectTitle) projectTitle.textContent = '開放個案';

    const repPanel = document.getElementById('representativeName')?.closest('.panel');
    if (repPanel) {
      repPanel.classList.add('representativePanel');
      const title = repPanel.querySelector('.sectionTitle');
      if (title) title.remove();
      repPanel.querySelectorAll('.field').forEach((field) => field.classList.add('inlineField'));
      const nameLabel = repPanel.querySelector('label:nth-of-type(1) span');
      const phoneLabel = repPanel.querySelector('label:nth-of-type(2) span');
      if (nameLabel) nameLabel.textContent = '代表人姓名';
      if (phoneLabel) phoneLabel.textContent = '代表人手機';
      const nameInput = document.getElementById('representativeName');
      const phoneInput = document.getElementById('representativePhone');
      if (nameInput) nameInput.placeholder = '例如：張大同';
      if (phoneInput) phoneInput.placeholder = '例如：0912-345-678';
    }

    const paymentPanel = document.getElementById('paymentMethod')?.closest('.panel');
    if (paymentPanel) {
      const title = paymentPanel.querySelector('.sectionTitle');
      if (title) title.textContent = '付款方式';
      const labels = {
        bankTransfer: '銀行轉帳',
        atm: 'ATM',
        cash: '現金',
        other: '其他'
      };
      paymentPanel.querySelectorAll('.optionButton').forEach((button) => {
        button.textContent = labels[button.dataset.value] || button.textContent.trim();
      });
    }

    const donorPanel = document.getElementById('bulkDonors')?.closest('.panel');
    if (donorPanel) {
      donorPanel.classList.add('donorEntryPanel');
      donorPanel.innerHTML = `
        <div class="donorHeader">
          <div class="sectionTitle">捐款芳名清單</div>
          <button id="lastFormButton" class="lastFormButton hidden" type="button">套用上次填寫</button>
        </div>
        <div class="donorModeButtons">
          <button id="donorModeBulk" class="donorModeButton" type="button">批次加入芳名</button>
          <button id="donorModeSingle" class="donorModeButton selected" type="button">新增一位</button>
        </div>
        <div id="bulkDonorPanel" class="donorModePanel hidden">
          <textarea id="bulkDonors" rows="5" placeholder="可貼上：王小明100、李小華200、Christian GRADERT100"></textarea>
          <button id="parseDonorsButton" class="secondaryAction" type="button">批次加入芳名</button>
          <div id="bulkDonorResult" class="bulkDonorResult"></div>
        </div>
        <div id="singleDonorPanel" class="donorModePanel">
          <label class="sameAsRepresentativeRow">
            <input id="sameAsRepresentative" type="checkbox">
            <span>芳名同代表人</span>
          </label>
          <div class="singleDonorGrid">
            <input id="singleDonorName" placeholder="填寫芳名">
            <input id="singleDonorAmount" inputmode="numeric" placeholder="金額">
          </div>
          <button id="addSingleDonorButton" class="secondaryAction" type="button">加入這一位</button>
          <div id="singleDonorResult" class="bulkDonorResult"></div>
        </div>
        <div id="donorList" class="donorList"></div>
        <div class="summary">
          <span>總金額</span>
          <strong id="totalAmount">0 元</strong>
        </div>
      `;
    }

    const receiptPanel = document.getElementById('receiptRequired')?.closest('.panel');
    if (receiptPanel) {
      const title = receiptPanel.querySelector('.sectionTitle');
      if (title) title.textContent = '收據';
      const buttons = receiptPanel.querySelectorAll('.receiptOptions .optionButton');
      if (buttons[0]) buttons[0].textContent = '需要收據';
      if (buttons[1]) buttons[1].textContent = '不需收據';
      const receiptOptions = receiptPanel.querySelector('.receiptOptions');
      if (receiptOptions && !document.getElementById('receiptMode')) {
        receiptOptions.insertAdjacentHTML('afterend', `
          <input id="receiptMode" type="hidden" value="representativeTotal">
          <div id="receiptModePanel" class="receiptModePanel">
            <div class="receiptModeTitle">收據開立方式</div>
            <div class="optionButtons receiptModeOptions" data-target="receiptMode">
              <button class="optionButton selected" type="button" data-value="representativeTotal">代表人+總金額</button>
              <button class="optionButton" type="button" data-value="eachDonor">每位捐款人單獨開立</button>
              <button class="optionButton" type="button" data-value="other">其他開立方式</button>
            </div>
          </div>
        `);
      }
      const memoLabel = receiptPanel.querySelector('.field span');
      const memo = document.getElementById('memo');
      if (memoLabel) memoLabel.textContent = '備註';
      if (memo) memo.placeholder = '可填轉帳後五碼、收據抬頭或其他補充';
    }
  }

  function cacheElements() {
    [
      'caseSelect',
      'caseCards',
      'representativeName',
      'representativePhone',
      'paymentMethod',
      'donorList',
      'donorTemplate',
      'bulkDonors',
      'bulkDonorResult',
      'totalAmount',
      'receiptRequired',
      'receiptMode',
      'receiptModePanel',
      'lastFormButton',
      'donorModeBulk',
      'donorModeSingle',
      'bulkDonorPanel',
      'singleDonorPanel',
      'singleDonorName',
      'singleDonorAmount',
      'sameAsRepresentative',
      'addSingleDonorButton',
      'singleDonorResult',
      'memo',
      'submitButton',
      'frontResult',
      'myRecords',
      'adminRows',
      'adminCaseSummary',
      'adminWorkArea',
      'adminBackButton',
      'adminCaseTitle',
      'adminCaseMeta',
      'adminSearch',
      'adminSelectAllButton',
      'adminClearSelectionButton',
      'adminBulkBar',
      'adminBulkCount',
      'refreshButton',
      'profileName',
      'adminButton',
      'bottomNav'
    ].forEach((id) => {
      els[id] = document.getElementById(id);
    });
  }

  function bindEvents() {
    document.querySelectorAll('.tabButton').forEach((button) => {
      button.addEventListener('click', () => switchView(button.dataset.view));
    });

    els.adminButton.addEventListener('click', openAdminWithPassword);

    document.querySelectorAll('.optionButtons').forEach((group) => {
      group.addEventListener('click', (event) => {
        const button = event.target.closest('.optionButton');
        if (!button) return;
        const target = document.getElementById(group.dataset.target);
        target.value = button.dataset.value;
        group.querySelectorAll('.optionButton').forEach((item) => {
          item.classList.toggle('selected', item === button);
        });
        if (group.dataset.target === 'receiptRequired') {
          updateReceiptModeVisibility();
        }
      });
    });

    els.donorModeBulk?.addEventListener('click', () => setDonorMode('bulk'));
    els.donorModeSingle?.addEventListener('click', () => setDonorMode('single'));
    document.getElementById('parseDonorsButton')?.addEventListener('click', parseBulkDonors);
    els.addSingleDonorButton?.addEventListener('click', addSingleDonor);
    els.sameAsRepresentative?.addEventListener('change', syncSameAsRepresentative);
    els.representativeName?.addEventListener('input', () => {
      if (els.sameAsRepresentative?.checked) syncSameAsRepresentative();
    });
    els.lastFormButton?.addEventListener('click', applyLastForm);
    els.submitButton.addEventListener('click', submitRegistration);
    els.refreshButton.addEventListener('click', loadData);
    els.adminBackButton.addEventListener('click', () => {
      state.adminCaseId = '';
      state.adminSelectedRecords.clear();
      renderAdminRows();
    });
    els.adminSearch.addEventListener('input', () => {
      state.adminSearch = els.adminSearch.value.trim();
      state.adminSelectedRecords.clear();
      renderAdminRows();
    });
    els.adminSelectAllButton.addEventListener('click', selectVisibleAdminRecords);
    els.adminClearSelectionButton.addEventListener('click', () => {
      state.adminSelectedRecords.clear();
      renderAdminRows();
    });
    document.querySelectorAll('.adminFilterButton').forEach((button) => {
      button.addEventListener('click', () => {
        state.adminFilter = button.dataset.filter;
        state.adminSelectedRecords.clear();
        renderAdminRows();
      });
    });
    els.adminCaseSummary.addEventListener('click', (event) => {
      const card = event.target.closest('[data-admin-case-id]');
      if (!card) return;
      state.adminCaseId = card.dataset.adminCaseId;
      state.adminSelectedRecords.clear();
      renderAdminRows();
    });
    els.adminRows.addEventListener('click', (event) => {
      const card = event.target.closest('[data-record-id]');
      if (!card) return;
      const recordId = card.dataset.recordId;
      if (state.adminSelectedRecords.has(recordId)) {
        state.adminSelectedRecords.delete(recordId);
      } else {
        state.adminSelectedRecords.add(recordId);
      }
      renderAdminRows();
    });
    els.adminBulkBar.addEventListener('click', (event) => {
      const button = event.target.closest('[data-action]');
      if (!button) return;
      runBulkAdminAction(button.dataset.action);
    });
    els.donorList.addEventListener('input', updateTotal);
    els.donorList.addEventListener('click', (event) => {
      if (event.target.classList.contains('removeDonor')) {
        event.target.closest('.donorRow').remove();
        updateTotal();
      }
    });
  }

  function hydrateInitialLineProfile() {
    state.lineUserId = document.body.dataset.lineUserId || '';
    state.liffProfileName = document.body.dataset.liffProfileName || '';
    if (state.liffProfileName) {
      els.profileName.textContent = `LINE：${state.liffProfileName}`;
    }
  }

  async function initLiff() {
    if (state.lineUserId) {
      showLineIdentityMessage('LINE 身分已完成，正在讀取你的回報紀錄。');
      return;
    }

    const liffId = document.body.dataset.liffId;
    showLineIdentityMessage(`LIFF 偵錯：準備初始化，LIFF ID=${liffId || '未設定'}`);
    if (!liffId) {
      showLineIdentityMessage('尚未設定 LIFF ID，請通知管理者。');
      return;
    }
    if (!window.liff) {
      showLineIdentityMessage('LINE 元件尚未載入，請關閉後從 LINE 重新開啟。');
      return;
    }

    try {
      showLineIdentityMessage('LIFF 偵錯：SDK 已載入，開始 liff.init()...');
      await withTimeout(liff.init({ liffId }), 15000, 'liff.init() 逾時');
      const inClient = liff.isInClient ? liff.isInClient() : '未知';
      const loggedIn = liff.isLoggedIn ? liff.isLoggedIn() : '未知';
      showLineIdentityMessage(`LIFF 偵錯：init 完成，inClient=${inClient}，loggedIn=${loggedIn}`);
      if (liff.isLoggedIn && !liff.isLoggedIn()) {
        if (liff.login) {
          showLineIdentityMessage('LIFF 偵錯：尚未登入，準備導向 LINE 登入...');
          liff.login({ redirectUri: window.location.href });
        }
        return;
      }
      if (!liff.getProfile) {
        showLineIdentityMessage('無法取得 LINE 個人資料，請從 LIFF 連結重新開啟。');
        return;
      }

      showLineIdentityMessage('LIFF 偵錯：開始讀取 LINE 個人資料...');
      const profile = await withTimeout(liff.getProfile(), 15000, 'liff.getProfile() 逾時');
      state.lineUserId = profile.userId;
      state.liffProfileName = profile.displayName;
      els.profileName.textContent = profile.displayName ? `LINE：${profile.displayName}` : '';
      showLineIdentityMessage(`LIFF 偵錯：取得成功，userId=${profile.userId ? profile.userId.slice(0, 8) + '...' : '空白'}`);
      loadData();
    } catch (error) {
      console.warn(error);
      showLineIdentityMessage(`LINE 身分讀取失敗：${lineErrorMessage(error)}`);
    }
  }

  function withTimeout(promise, ms, message) {
    return Promise.race([
      promise,
      new Promise((_, reject) => setTimeout(() => reject(new Error(message)), ms))
    ]);
  }

  function showLineIdentityMessage(message) {
    if (els.myRecords) {
      els.myRecords.innerHTML = `<div class="notice">${escapeHtml(message)}</div>`;
    }
  }

  function lineErrorMessage(error) {
    if (!error) return '請關閉後從 LINE 重新開啟。';
    const code = error.code ? `${error.code} ` : '';
    const message = error.message || String(error);
    return `${code}${message}`;
  }

  function loadData() {
    setBusy(true);
    renderLoadingCases();
    google.script.run
      .withSuccessHandler((data) => {
        state.cases = data.cases || [];
        state.registrations = data.registrations || [];
        renderCases();
        renderMyRecords();
        renderAdminRows();
        setBusy(false);
      })
      .withFailureHandler(showError)
      .getInitialData({
        lineUserId: state.lineUserId,
        admin: state.currentView === 'admin' && sessionStorage.getItem(ADMIN_SESSION_KEY) === '1'
      });
  }

  function renderLoadingCases() {
    if (els.caseCards) {
      els.caseCards.innerHTML = '<div class="notice">正在讀取開放個案...</div>';
    }
  }

  function renderCases() {
    if (!state.cases.length) {
      els.caseSelect.value = '';
      els.caseCards.innerHTML = '<div class="notice">目前沒有可登記的開放個案。</div>';
      els.submitButton.disabled = true;
      return;
    }

    if (!els.caseSelect.value || !state.cases.some((item) => item.caseId === els.caseSelect.value)) {
      els.caseSelect.value = state.cases[0].caseId;
    }

    els.caseCards.innerHTML = state.cases.map((item, index) => {
      const remaining = Number(item.remainingAmount ?? Math.max(Number(item.targetAmount || 0) - Number(item.currentAmount || 0), 0));
      const selected = item.caseId === els.caseSelect.value;
      return `
        <button class="caseCard theme${index % 5} ${selected ? 'selected' : ''}" type="button" data-case-id="${escapeAttr(item.caseId)}">
          <span class="caseMain">
            <span class="caseTitle">
              <span>${escapeHtml(item.caseId)}</span>
              <strong>${escapeHtml(item.title)}</strong>
            </span>
          </span>
          <span class="caseAmount">
            <span>目標金額 ${money(item.targetAmount)}</span>
            <strong>目標餘額 ${money(remaining)}</strong>
          </span>
          <span class="caseBar"><span style="width:${caseProgress(item)}%"></span></span>
        </button>
      `;
    }).join('');

    els.caseCards.querySelectorAll('.caseCard').forEach((button) => {
      button.addEventListener('click', () => {
        els.caseSelect.value = button.dataset.caseId;
        renderCases();
      });
    });
  }

  function caseProgress(item) {
    const target = Number(item.targetAmount || 0);
    if (!target) return 0;
    return Math.min(Math.round((Number(item.currentAmount || 0) / target) * 100), 100);
  }

  function setDonorMode(mode) {
    const isBulk = mode === 'bulk';
    els.bulkDonorPanel?.classList.toggle('hidden', !isBulk);
    els.singleDonorPanel?.classList.toggle('hidden', isBulk);
    els.donorModeBulk?.classList.toggle('selected', isBulk);
    els.donorModeSingle?.classList.toggle('selected', !isBulk);
  }

  function addSingleDonor() {
    const name = els.singleDonorName.value.trim();
    const amount = Number(String(els.singleDonorAmount.value || '').replace(/,/g, ''));
    if (!name || !amount || amount <= 0) {
      els.singleDonorResult.textContent = '請填寫芳名與正確金額。';
      return;
    }
    addDonorRow(name, amount);
    els.singleDonorName.value = els.sameAsRepresentative?.checked ? els.representativeName.value.trim() : '';
    els.singleDonorAmount.value = '';
    els.singleDonorResult.textContent = `已加入：${name} ${money(amount)} 元`;
    updateTotal();
  }

  function syncSameAsRepresentative() {
    if (!els.sameAsRepresentative?.checked) return;
    const name = els.representativeName.value.trim();
    if (!name) {
      els.sameAsRepresentative.checked = false;
      els.singleDonorResult.textContent = '請先填寫代表人姓名。';
      els.representativeName.focus();
      return;
    }
    els.singleDonorName.value = name;
    els.singleDonorResult.textContent = '';
  }

  function updateReceiptModeVisibility() {
    const needsReceipt = els.receiptRequired?.value === 'true';
    els.receiptModePanel?.classList.toggle('hidden', !needsReceipt);
  }

  function receiptModeLabel(value) {
    return {
      representativeTotal: '代表人+總金額',
      eachDonor: '每位捐款人單獨開立',
      other: '其他開立方式'
    }[value] || '代表人+總金額';
  }

  function setOptionValue(targetId, value) {
    const input = document.getElementById(targetId);
    if (!input) return;
    input.value = value;
    document.querySelectorAll(`.optionButtons[data-target="${targetId}"] .optionButton`).forEach((button) => {
      button.classList.toggle('selected', button.dataset.value === value);
    });
    if (targetId === 'receiptRequired') updateReceiptModeVisibility();
  }

  function refreshLastFormButton() {
    if (!els.lastFormButton) return;
    els.lastFormButton.classList.toggle('hidden', !localStorage.getItem(LAST_FORM_KEY));
  }

  function saveLastForm(payload, rawMemo) {
    const data = {
      representativeName: payload.representativeName,
      representativePhone: payload.representativePhone,
      paymentMethod: payload.paymentMethod,
      donors: payload.donors,
      receiptRequired: payload.receiptRequired,
      receiptMode: els.receiptMode?.value || 'representativeTotal',
      memo: rawMemo || ''
    };
    localStorage.setItem(LAST_FORM_KEY, JSON.stringify(data));
    refreshLastFormButton();
  }

  function applyLastForm() {
    let data = null;
    try {
      data = JSON.parse(localStorage.getItem(LAST_FORM_KEY) || 'null');
    } catch (error) {
      localStorage.removeItem(LAST_FORM_KEY);
    }
    if (!data) {
      refreshLastFormButton();
      return;
    }
    els.representativeName.value = data.representativeName || '';
    els.representativePhone.value = data.representativePhone || '';
    els.memo.value = data.memo || '';
    setOptionValue('paymentMethod', data.paymentMethod || 'bankTransfer');
    setOptionValue('receiptRequired', String(data.receiptRequired !== false));
    setOptionValue('receiptMode', data.receiptMode || 'representativeTotal');
    els.donorList.innerHTML = '';
    (data.donors || []).forEach((donor) => addDonorRow(donor.name, donor.amount));
    updateTotal();
  }

  function addDonorRow(name = '', amount = '') {
    const fragment = els.donorTemplate.content.cloneNode(true);
    const nameInput = fragment.querySelector('.donorName');
    const amountInput = fragment.querySelector('.donorAmount');
    const removeButton = fragment.querySelector('.removeDonor');
    nameInput.placeholder = '芳名';
    amountInput.placeholder = '金額';
    nameInput.value = name;
    amountInput.value = amount;
    removeButton.textContent = '刪除';
    removeButton.title = '刪除這一位';
    els.donorList.appendChild(fragment);
  }

  function parseBulkDonors() {
    const text = els.bulkDonors.value.trim();
    if (!text) {
      els.bulkDonorResult.textContent = '請先貼上芳名與金額。';
      return;
    }

    const parsed = text
      .split(/[、，,；;\n\r]+/)
      .map((item) => item.trim())
      .filter(Boolean)
      .map(parseDonorToken)
      .filter(Boolean);

    if (!parsed.length) {
      els.bulkDonorResult.textContent = '格式看不出來，請用「姓名100、姓名200」這種格式。';
      return;
    }

    const current = readDonors();
    if (!current.length) {
      els.donorList.innerHTML = '';
    }

    parsed.forEach((donor) => addDonorRow(donor.name, donor.amount));
    updateTotal();
    els.bulkDonorResult.textContent = `已加入 ${parsed.length} 位，合計 ${money(parsed.reduce((sum, donor) => sum + donor.amount, 0))} 元`;
  }

  function parseDonorToken(token) {
    const match = token.match(/^(.+?)[\s:：]*([0-9][0-9,]*)$/);
    if (!match) return null;

    const name = match[1].trim();
    const amount = Number(match[2].replace(/,/g, ''));
    if (!name || !amount || amount <= 0) return null;
    return { name, amount };
  }

  function readDonors() {
    return Array.from(document.querySelectorAll('.donorRow'))
      .map((row) => ({
        name: row.querySelector('.donorName').value.trim(),
        amount: Number(row.querySelector('.donorAmount').value || 0)
      }))
      .filter((donor) => donor.name && donor.amount > 0);
  }

  function updateTotal() {
    const total = readDonors().reduce((sum, donor) => sum + donor.amount, 0);
    els.totalAmount.textContent = `${money(total)} 元`;
  }

  function submitRegistration() {
    const donors = readDonors();
    const totalAmount = donors.reduce((sum, donor) => sum + donor.amount, 0);
    const rawMemo = els.memo.value.trim();
    const receiptNote = els.receiptRequired.value === 'true'
      ? `收據開立方式：${receiptModeLabel(els.receiptMode?.value)}`
      : '收據：不需收據';
    const payload = {
      caseId: els.caseSelect.value,
      representativeName: els.representativeName.value.trim(),
      representativePhone: els.representativePhone.value.trim(),
      paymentMethod: els.paymentMethod.value,
      donors,
      totalAmount,
      receiptRequired: els.receiptRequired.value === 'true',
      memo: [receiptNote, rawMemo].filter(Boolean).join('\n'),
      lineUserId: state.lineUserId,
      liffProfileName: state.liffProfileName
    };

    setBusy(true);
    els.frontResult.innerHTML = '<div class="notice">正在排隊送出登記，請不要關閉或重複按送出。</div>';
    google.script.run
      .withSuccessHandler((result) => {
        saveLastForm(payload, rawMemo);
        els.frontResult.innerHTML = `
          <div class="success">
            登記完成<br>
            登記編號：<strong>${escapeHtml(result.record.recordId)}</strong><br>
            金額：${money(result.record.totalAmount)} 元
          </div>
        `;
        resetForm();
        switchView('report');
        loadData();
      })
      .withFailureHandler(showError)
      .createRegistration(payload);
  }

  function resetForm() {
    els.representativeName.value = '';
    els.representativePhone.value = '';
    els.memo.value = '';
    if (els.bulkDonors) els.bulkDonors.value = '';
    if (els.bulkDonorResult) els.bulkDonorResult.textContent = '';
    if (els.singleDonorName) els.singleDonorName.value = '';
    if (els.singleDonorAmount) els.singleDonorAmount.value = '';
    if (els.singleDonorResult) els.singleDonorResult.textContent = '';
    if (els.sameAsRepresentative) els.sameAsRepresentative.checked = false;
    els.donorList.innerHTML = '';
    setDonorMode('single');
    updateTotal();
  }

  function renderMyRecords() {
    if (!state.lineUserId) {
      els.myRecords.innerHTML = '<div class="notice">正在取得 LINE 身分，完成後會顯示你的回報紀錄。</div>';
      return;
    }

    const mine = state.registrations
      .filter((record) => !isCancelled(record.paymentStatus))
      .filter((record) => record.lineUserId === state.lineUserId)
      .filter((record) => isPaymentPending(record.paymentStatus) || isReported(record.paymentStatus))
      .slice(0, 20);

    if (!mine.length) {
      els.myRecords.innerHTML = '<div class="notice">目前沒有待回報或待確認的紀錄。</div>';
      return;
    }

    els.myRecords.innerHTML = mine.map((record) => {
      const reported = isReported(record.paymentStatus);
      const reportLabel = reported ? '更正回報' : '付款回報';
      return `
        <article class="recordCard">
          <div class="recordActionRow">
            <div class="recordInfoPanel">
              <strong>${escapeHtml(record.recordId)}</strong>
              <span>金額 ${money(record.totalAmount)} 元</span>
            </div>
            <div class="recordStatusPanel">
              <div>付款狀態 ${statusPill(record.paymentStatus, 'payment')}</div>
              <div>收據狀態 ${statusPill(record.receiptStatus, 'receipt')}</div>
            </div>
            <button class="reportButton ${reported ? 'reported' : ''}" type="button" onclick="reportPayment('${escapeAttr(record.recordId)}')">${reportLabel}</button>
          </div>
        </article>
      `;
    }).join('');
  }

  function reportPayment(recordId) {
    const lastFive = prompt([
      '付款回報：請輸入匯款帳號末 5 碼',
      '',
      '只需要輸入 5 個數字，例如：12345',
      '若前一次填錯，重新輸入即可覆蓋。',
      '',
      '請勿輸入金額、文字、空白或符號。'
    ].join('\n'));
    if (lastFive === null) return;
    const cleaned = String(lastFive).trim();
    if (!/^\d{5}$/.test(cleaned)) {
      alert('請只輸入帳號末 5 碼，必須剛好是 5 個數字，例如：12345');
      return;
    }
    setBusy(true);
    google.script.run
      .withSuccessHandler(loadData)
      .withFailureHandler(showError)
      .reportPayment(recordId, cleaned);
  }

  function renderAdminRows() {
    renderAdminCaseSummary();
    renderAdminWorkArea();
    renderAdminBulkBar();
  }

  function renderAdminCaseSummary() {
    const caseIds = Array.from(new Set([
      ...state.cases.map((item) => item.caseId),
      ...state.registrations.map((record) => record.caseId)
    ])).filter(Boolean);

    if (!caseIds.length) {
      els.adminCaseSummary.innerHTML = '<div class="notice">目前沒有專案資料。</div>';
      return;
    }

    els.adminCaseSummary.innerHTML = caseIds.map((caseId) => {
      const caseInfo = state.cases.find((item) => item.caseId === caseId) || {};
      const records = state.registrations.filter((record) => record.caseId === caseId);
      const active = state.adminCaseId === caseId;
      const pending = records.filter((record) => isPaymentPending(record.paymentStatus)).length;
      const reported = records.filter((record) => isReported(record.paymentStatus)).length;
      const receiptPending = records.filter((record) => isReceiptPending(record.receiptStatus)).length;
      const done = records.filter((record) => isDone(record.paymentStatus) && !isReceiptPending(record.receiptStatus)).length;
      const needAction = records.filter(needsAdminAction).length;
      return `
        <button class="adminCaseCard ${active ? 'active' : ''}" type="button" data-admin-case-id="${escapeAttr(caseId)}">
          <strong>${escapeHtml(caseId)} ${escapeHtml(caseInfo.title || '')}</strong>
          <span>需處理 ${needAction} 筆｜總登記 ${records.length} 筆</span>
          <div class="adminCaseStats">
            <span>待付款 ${pending}</span>
            <span>已回報 ${reported}</span>
            <span>收據待處理 ${receiptPending}</span>
            <span>完成 ${done}</span>
          </div>
        </button>
      `;
    }).join('');
  }

  function renderAdminWorkArea() {
    const hasCase = Boolean(state.adminCaseId);
    els.adminWorkArea.classList.toggle('hidden', !hasCase);
    if (!hasCase) {
      els.adminRows.innerHTML = '';
      return;
    }

    const caseInfo = state.cases.find((item) => item.caseId === state.adminCaseId) || {};
    const records = getVisibleAdminRecords();
    els.adminCaseTitle.textContent = `${state.adminCaseId} ${caseInfo.title || ''}`;
    els.adminCaseMeta.textContent = `目前顯示 ${records.length} 筆，已選 ${state.adminSelectedRecords.size} 筆`;
    els.adminSearch.value = state.adminSearch;
    document.querySelectorAll('.adminFilterButton').forEach((button) => {
      button.classList.toggle('active', button.dataset.filter === state.adminFilter);
    });

    if (!records.length) {
      els.adminRows.innerHTML = '<div class="notice">目前篩選條件下沒有資料。</div>';
      return;
    }

    els.adminRows.innerHTML = records.map((record) => {
      const selected = state.adminSelectedRecords.has(record.recordId);
      const cancelled = isCancelled(record.paymentStatus);
      return `
        <article class="adminRecordCard ${selected ? 'selected' : ''} ${cancelled ? 'cancelledRow' : ''}" data-record-id="${escapeAttr(record.recordId)}">
          <div class="adminCheck">${selected ? '✓' : ''}</div>
          <div class="adminRecordMain">
            <strong>${escapeHtml(record.recordId)}｜${money(record.totalAmount)} 元</strong>
            <span>${escapeHtml(record.representativeName)}　${escapeHtml(record.representativePhone || '')}</span>
            <small>${record.donors.map((donor) => `${escapeHtml(donor.name)} ${money(donor.amount)}`).join('、')}</small>
          </div>
          <div class="adminRecordStatus">
            <div>付款 ${statusPill(record.paymentStatus, 'payment')}</div>
            <div>收據 ${statusPill(record.receiptStatus, 'receipt')}</div>
          </div>
        </article>
      `;
    }).join('');
  }

  function getVisibleAdminRecords() {
    const keyword = state.adminSearch.toLowerCase();
    return state.registrations
      .filter((record) => record.caseId === state.adminCaseId)
      .filter((record) => {
        if (state.adminFilter === 'all') return true;
        if (state.adminFilter === 'needsAction') return needsAdminAction(record);
        if (state.adminFilter === 'reported') return isReported(record.paymentStatus);
        if (state.adminFilter === 'receiptPending') return isReceiptPending(record.receiptStatus);
        if (state.adminFilter === 'pending') return isPaymentPending(record.paymentStatus);
        return true;
      })
      .filter((record) => {
        if (!keyword) return true;
        const donorText = record.donors.map((donor) => `${donor.name} ${donor.amount}`).join(' ');
        return [
          record.recordId,
          record.representativeName,
          record.representativePhone,
          record.totalAmount,
          donorText
        ].some((value) => String(value || '').toLowerCase().includes(keyword));
      });
  }

  function needsAdminAction(record) {
    return isReported(record.paymentStatus)
      || (isDone(record.paymentStatus) && isReceiptPending(record.receiptStatus));
  }

  function isReceiptPending(value) {
    return value === 'pending' || value === '待處理' || value === '';
  }

  function selectVisibleAdminRecords() {
    getVisibleAdminRecords()
      .filter((record) => !isCancelled(record.paymentStatus))
      .forEach((record) => state.adminSelectedRecords.add(record.recordId));
    renderAdminRows();
  }

  function renderAdminBulkBar() {
    const selected = Array.from(state.adminSelectedRecords);
    els.adminBulkBar.classList.toggle('hidden', !selected.length || state.currentView !== 'admin');
    els.adminBulkCount.textContent = `已選 ${selected.length} 筆`;
  }

  async function runBulkAdminAction(action) {
    const recordIds = Array.from(state.adminSelectedRecords);
    if (!recordIds.length) return;

    const actionLabels = {
      paid: '確認入帳',
      receiptDone: '收據完成',
      paymentPending: '退回待付款',
      paymentReported: '退回已回報',
      receiptPending: '收據待處理',
      receiptNotRequired: '不需收據',
      cancel: '取消登記'
    };
    const label = actionLabels[action] || '批次操作';
    const needsMemo = ['paymentPending', 'paymentReported', 'receiptPending', 'receiptNotRequired', 'cancel'].includes(action);
    const memo = needsMemo
      ? (prompt(`${label}：請輸入原因（將套用 ${recordIds.length} 筆，可空白）`) || '')
      : '';

    if (!confirm(`確定要將 ${recordIds.length} 筆資料「${label}」？`)) return;

    setBusy(true);
    try {
      for (const recordId of recordIds) {
        await runAdminAction(recordId, action, memo);
      }
      state.adminSelectedRecords.clear();
      loadData();
    } catch (error) {
      showError(error);
    }
  }

  function runAdminAction(recordId, action, memo) {
    const todayValue = today();
    return new Promise((resolve, reject) => {
      const runner = google.script.run
        .withSuccessHandler(resolve)
        .withFailureHandler(reject);

      if (action === 'paid') {
        runner.updatePayment(recordId, 'paid', todayValue);
      } else if (action === 'receiptDone') {
        runner.updateReceipt(recordId, 'done', '', todayValue);
      } else if (action === 'paymentPending') {
        runner.resetPaymentStatus(recordId, 'pending', memo);
      } else if (action === 'paymentReported') {
        runner.resetPaymentStatus(recordId, 'reported', memo);
      } else if (action === 'receiptPending') {
        runner.resetReceiptStatus(recordId, 'pending', memo);
      } else if (action === 'receiptNotRequired') {
        runner.resetReceiptStatus(recordId, 'notRequired', memo);
      } else if (action === 'cancel') {
        runner.cancelRegistration(recordId, memo);
      } else {
        reject(new Error('未知的批次操作'));
      }
    });
  }

  function markPaid(recordId) {
    setBusy(true);
    google.script.run
      .withSuccessHandler(loadData)
      .withFailureHandler(showError)
      .updatePayment(recordId, 'paid', today());
  }

  function markReceiptDone(recordId) {
    const receiptNo = prompt('請輸入收據編號');
    if (!receiptNo) return;
    setBusy(true);
    google.script.run
      .withSuccessHandler(loadData)
      .withFailureHandler(showError)
      .updateReceipt(recordId, 'done', receiptNo, today());
  }

  function cancelRegistration(recordId) {
    const cancelMemo = prompt('請輸入取消原因（可空白）') || '';
    if (!confirm(`確定要取消 ${recordId}？取消後不會列入目前登記金額。`)) return;
    setBusy(true);
    google.script.run
      .withSuccessHandler(loadData)
      .withFailureHandler(showError)
      .cancelRegistration(recordId, cancelMemo);
  }

  function resetPayment(recordId, status) {
    const labels = {
      pending: '退回待付款',
      reported: '退回已回報',
      paid: '確認入帳',
      cancelled: '取消登記'
    };
    const memo = prompt(`${labels[status] || '修正付款狀態'}：請輸入修正原因（可空白）`) || '';
    if (!confirm(`確定要將 ${recordId} ${labels[status] || '修正付款狀態'}？`)) return;
    setBusy(true);
    google.script.run
      .withSuccessHandler(loadData)
      .withFailureHandler(showError)
      .resetPaymentStatus(recordId, status, memo);
  }

  function resetReceipt(recordId, status) {
    const labels = {
      pending: '收據退回待處理',
      notRequired: '改為不需收據',
      done: '收據已處理',
      ignored: '收據不處理'
    };
    const memo = prompt(`${labels[status] || '修正收據狀態'}：請輸入修正原因（可空白）`) || '';
    if (!confirm(`確定要將 ${recordId} ${labels[status] || '修正收據狀態'}？`)) return;
    setBusy(true);
    google.script.run
      .withSuccessHandler(loadData)
      .withFailureHandler(showError)
      .resetReceiptStatus(recordId, status, memo);
  }

  function switchView(view) {
    state.currentView = view;
    document.getElementById('registrationView').classList.toggle('hidden', view !== 'registration');
    document.getElementById('reportView').classList.toggle('hidden', view !== 'report');
    document.getElementById('adminView').classList.toggle('hidden', view !== 'admin');
    els.bottomNav.classList.toggle('hidden', view === 'admin');
    renderAdminBulkBar();
    document.querySelectorAll('.tabButton').forEach((button) => {
      button.classList.toggle('active', button.dataset.view === view);
    });
    window.scrollTo(0, 0);
  }

  function openAdminWithPassword() {
    if (sessionStorage.getItem(ADMIN_SESSION_KEY) === '1') {
      switchView('admin');
      loadData();
      return;
    }

    const password = prompt('請輸入後台密碼');
    if (password === null) return;

    if (password === ADMIN_PASSWORD) {
      sessionStorage.setItem(ADMIN_SESSION_KEY, '1');
      switchView('admin');
      loadData();
      return;
    }

    alert('密碼錯誤');
  }

  function statusPill(value, type) {
    const text = String(value || '').trim();
    const labels = {
      pending: type === 'payment' ? '待付款' : '待處理',
      paid: '已確認入帳',
      reported: '已回報',
      done: '收據已處理',
      notRequired: '不需收據',
      cancelled: '已取消',
      canceled: '已取消',
      待付款: '待付款',
      已回報: '已回報',
      已確認入帳: '已確認入帳',
      待處理: '待處理',
      收據已處理: '收據已處理',
      不需收據: '不需收據',
      不處理: '不處理',
      已取消: '已取消'
    };

    let pillClass = 'pending';
    if (isCancelled(text)) {
      pillClass = 'cancelled';
    } else if (isReported(text)) {
      pillClass = 'reported';
    } else if (isDone(text)) {
      pillClass = 'done';
    } else if (isPaymentPending(text) || text === '待處理' || !text) {
      pillClass = type === 'payment' ? 'paymentPending' : 'receiptPending';
    }

    return `<span class="pill ${pillClass}">${labels[text] || escapeHtml(text || '待處理')}</span>`;
  }

  function isPaymentPending(value) {
    return value === 'pending' || value === '待付款' || value === '';
  }

  function isReported(value) {
    return value === 'reported' || value === '已回報';
  }

  function isCancelled(value) {
    return value === 'cancelled' || value === 'canceled' || value === '已取消';
  }

  function isDone(value) {
    return ['paid', 'done', 'notRequired', '已確認入帳', '收據已處理', '不需收據', '不處理'].includes(value);
  }

  function setBusy(isBusy) {
    if (state.cases.length) {
      els.submitButton.disabled = isBusy;
    }
    els.refreshButton.disabled = isBusy;
    document.querySelectorAll('#adminView button, #adminBulkBar button').forEach((button) => {
      button.disabled = isBusy;
    });
  }

  function showError(error) {
    setBusy(false);
    const message = escapeHtml(error.message || error);
    if (state.currentView === 'registration') {
      els.frontResult.innerHTML = `<div class="notice">${message}</div>`;
    } else if (state.currentView === 'report') {
      els.myRecords.innerHTML = `<div class="notice">${message}</div>`;
    } else {
      alert(message);
    }
  }

  function money(value) {
    return Number(value || 0).toLocaleString('zh-TW');
  }

  function today() {
    return new Date().toISOString().slice(0, 10);
  }

  function escapeHtml(value) {
    return String(value ?? '')
      .replaceAll('&', '&amp;')
      .replaceAll('<', '&lt;')
      .replaceAll('>', '&gt;')
      .replaceAll('"', '&quot;')
      .replaceAll("'", '&#039;');
  }

  function escapeAttr(value) {
    return escapeHtml(value).replaceAll('`', '&#096;');
  }
</script>
